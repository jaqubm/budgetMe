<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#0f172a"/>

  <!-- Wallet body -->
  <rect x="4" y="10" width="24" height="16" rx="3" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <!-- Wallet flap / top edge -->
  <rect x="4" y="10" width="24" height="4" rx="3" fill="#334155"/>

  <!-- Coin slot / card pocket -->
  <rect x="18" y="15" width="8" height="5" rx="2" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>

  <!-- Green dot inside pocket (coin) -->
  <circle cx="22" cy="17.5" r="1.5" fill="#22c55e"/>

  <!-- Upward trend arrow in bottom-left of wallet -->
  <polyline points="6,23 10,20 13,22 17,18" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
